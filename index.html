<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Kubernetes App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .status {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 25px;
      background: #00ff88;
      color: #000;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9em;
      opacity: 0.8;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #fff;
      color: #333;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 My Kubernetes App</h1>
    <p>Deployed successfully on Kubernetes 🎉</p>

    <div class="status">RUNNING</div>

    <br>

    <button class="btn" onclick="showMessage()">Click Me</button>

    <div class="footer">
      Powered by Docker + GitHub Actions + Kubernetes
    </div>
  </div>

  <script>
    function showMessage() {
      alert("Hello from your Kubernetes App! 🚀");
    }
  </script>
</body>
</html>
