apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: ghcr.io/tuangsit-msi/my-kubernetes-app:latest
        ports:
        - containerPort: 80